name: RevContent FinOps
description: Financial operations guidance for managing costs on RevContent's native
  advertising platform. RevContent uses performance-based pricing (CPC and vCPM)
  with advertiser-controlled daily budgets, minimum bid floors, and no fixed subscription
  fees. Cost management is campaign-level and directly tied to bidding strategy,
  daily caps, and targeting precision.
url: https://www.revcontent.com/advertisers/
created: '2026-06-13'
modified: '2026-06-13'

pricingModels:
  - name: CPC (Cost Per Click)
    description: Advertisers are billed each time a user clicks on their native
      ad content. Bids are set per campaign boost and subject to a minimum
      floor enforced by the API.
    minimumBid: 0.01
    currency: USD
    billingTrigger: Click

  - name: vCPM (Viewable Cost Per Thousand Impressions)
    description: Advertisers are billed per one thousand viewable impressions
      rather than per click. Suitable for brand awareness campaigns.
    currency: USD
    billingTrigger: 1000 Viewable Impressions

  - name: Revenue Share (Publishers)
    description: Publishers earn a share of advertising revenue generated by
      clicks and impressions on widgets placed on their sites. Revenue share
      percentage is negotiated with RevContent.
    billingTrigger: Click / Impression

budgetControls:
  - name: Daily Budget Cap
    description: Each campaign (boost) has a configurable daily budget.
      The minimum daily budget is $50 per campaign.
    minimumDailyBudget: 50
    currency: USD
    notes: Unlimited budget boosts require CSR approval and unlock campaign
      scheduling features.

  - name: Campaign Scheduling
    description: Hour-level campaign scheduling is available for boosts with
      unlimited budgets, allowing spend control by time-of-day.
    availability: Unlimited budget boosts only

  - name: Widget-Level Bid Overrides
    description: Advertisers can set widget-specific bids through targeting
      endpoints, allowing granular cost optimization by publisher widget.

costOptimizationGuidance:
  - Use widget-level targeting bids to reduce spend on low-performing widgets.
  - Leverage geo targeting (country, region, DMA, zip code) to focus budget
    on high-value audiences.
  - Monitor "cost per conversion" metrics available in boost performance,
    widget stats, and content stats endpoints (added July 2021) to optimize ROI.
  - Use the "do_all" safety parameter cautiously when applying bulk boost
    updates to avoid unintended spend changes across all campaigns.
  - Device and OS targeting (separated in March 2021) enables platform-specific
    budget allocation for mobile vs. desktop optimization.
  - Set device-specific bids via the widget targeting endpoint to manage CPC
    costs by device type.

observability:
  - name: Stats API
    description: Programmatic access to performance data including impressions,
      clicks, spend, and cost per conversion for boosts, widgets, and content.
    endpoints:
      - Get Boost Performance
      - Get Widget Stats
      - Get Content Widget Stats
      - Get Publisher Widget Stats

  - name: CCPA Compliance Cost
    description: CCPA data request and deletion API is available at no additional
      charge. Data deletion is processed within 90 days.

notes:
  - RevContent does not charge a platform subscription fee; all costs are
    performance-based tied to campaign activity.
  - API access is free to account holders; there are no API call charges.
  - Budget is controlled per boost (campaign), not at an account-wide level.
  - Publisher payments are processed through RevContent's internal revenue
    share accounting; no public rate card is disclosed.
