aid: revcontent
name: RevContent
description: RevContent is a performance-driven native advertising and content recommendation
  network offering a REST API for managing widgets, campaigns (boosts), ad content,
  audience targeting, bidding, and performance reporting. Publishers and advertisers
  access the platform through OAuth 2.0 authenticated endpoints to programmatically
  control campaign settings, device and geo targeting, content delivery, and statistical
  reporting at scale.
