name: RevContent Plans and Pricing
description: RevContent operates a self-serve native advertising platform with performance-based
  pricing for advertisers and revenue-share monetization for publishers. There are
  no tiered subscription plans; access is open to qualifying advertisers and publishers
  who meet content quality and traffic standards.
url: https://www.revcontent.com/advertisers/
created: '2026-06-13'
modified: '2026-06-13'

plans:
  - name: Advertiser Self-Serve
    description: Open self-serve access for advertisers to create and manage native
      ad campaigns (boosts) across RevContent's publisher network. Pricing is
      performance-based with no fixed monthly fee.
    url: https://www.revcontent.com/advertisers/
    pricingModel: CPC / vCPM
    free: false
    freeTrial: false
    features:
      - CPC (Cost Per Click) and vCPM (Viewable Cost Per Thousand Impressions) bidding
      - Minimum CPC bid of $0.01 enforced via API
      - Minimum daily budget of $50 per campaign
      - Device, OS, geo (country, region, DMA, zip code) targeting
      - Content widget management and performance reporting
      - Campaign scheduling (hour-level, for unlimited budget boosts)
      - API access enabled on request through account settings
      - OAuth 2.0 API credentials (client_id and client_secret) via Account Settings

  - name: Publisher Monetization
    description: Revenue-share program for approved publishers integrating RevContent
      native ad widgets on their sites. Publishers earn a share of CPC/CPM revenue
      generated by widget clicks and impressions.
    url: https://www.revcontent.com/publishers
    pricingModel: Revenue Share
    free: false
    freeTrial: false
    features:
      - Lightweight, cookieless native ad widgets
      - AI-driven content recommendations
      - API access for widget and stats management
      - Publisher-level performance reporting via Stats API
      - Widget Sub ID tracking support
      - CCPA data request and deletion API support

notes:
  - RevContent does not publicly publish fixed pricing tiers or monthly plan fees.
  - Advertiser CPC bids and daily budgets are set per campaign.
  - API access requires account approval; credentials are issued via Account Settings.
  - Publisher acceptance is subject to content quality and traffic requirements.
  - No free trial or free version is available.
  - Unlimited budget campaigns have access to campaign scheduling features.
